<div class="flex flex-col w-full text-left">
  <!-- Label -->
  @if (label) {
    <label 
      [attr.for]="inputId" 
      class="mb-1.5 text-sm font-medium text-sand-700"
    >
      {{ label }}
    </label>
  }

  <!-- Input Container -->
  <div class="relative w-full">
    <!-- Icon Left (Optional) -->
    @if (icon) {
      <span 
        class="material-icons absolute left-3.5 text-sand-400 pointer-events-none select-none text-xl"
        [ngClass]="(type === 'textarea' && rows > 1) ? 'top-3' : 'top-1/2 -translate-y-1/2'"
      >
        {{ icon }}
      </span>
    }

    <!-- Input Tag / Textarea Tag -->
    @if (type === 'textarea') {
      <textarea
        [attr.id]="inputId"
        [placeholder]="placeholder"
        [disabled]="disabled"
        [value]="value"
        [rows]="rows"
        (input)="onInput($event)"
        (blur)="onBlur()"
        [ngClass]="[
          baseClasses,
          sizeClasses[size],
          hasError ? stateClasses.error : (disabled ? stateClasses.disabled : stateClasses.normal),
          icon ? 'pl-11' : '',
          'resize-none'
        ]"
      ></textarea>
    } @else {
      <input
        [attr.id]="inputId"
        [type]="type"
        [placeholder]="placeholder"
        [disabled]="disabled"
        [value]="value"
        [attr.maxlength]="type === 'tel' ? 10 : null"
        [attr.min]="min || null"
        [attr.max]="max || null"
        (input)="onInput($event)"
        (blur)="onBlur()"
        [ngClass]="[
          baseClasses,
          sizeClasses[size],
          hasError ? stateClasses.error : (disabled ? stateClasses.disabled : stateClasses.normal),
          icon ? 'pl-11' : ''
        ]"
      />
    }
  </div>

  <!-- Error Message -->
  @if (errorMessage) {
    <p class="mt-1.5 text-sm text-red-500 font-medium flex items-center gap-1">
      <span class="material-icons text-sm">error</span>
      {{ errorMessage }}
    </p>
  }
</div>
