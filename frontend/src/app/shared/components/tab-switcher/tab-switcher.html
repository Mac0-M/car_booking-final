<div
  class="relative flex bg-transparent select-none shrink-0 border-b border-sand-200 w-[80px] md:w-[90px] pb-2"
>
  <button
    (click)="toggleActiveTab()"
    class="relative z-10 flex-1 flex items-center justify-center text-[11px] md:text-xs font-bold text-primary transition-colors cursor-pointer select-none border-0 bg-transparent w-full"
    [title]="(('Switch to ' + (activeTab === tab1Value ? tab2Label : tab1Label)) | translate)"
  >
    @if (activeTab === tab1Value) {
    <span
      class="flex items-center justify-center gap-1 md:gap-1.5 animate-slide-in-left w-full"
    >
      @if (tab1Icon) {
      <span class="material-icons text-primary text-xs md:text-sm"
        >{{ tab1Icon }}</span
      >
      }
      <translate-fixed [key]="tab1Label" />
    </span>
    } @else {
    <div
      class="flex items-center justify-center gap-1 md:gap-1.5 animate-slide-in-right w-full"
    >
      @if (tab2Icon) {
      <span class="material-icons text-primary text-xs md:text-sm"
        >{{ tab2Icon }}</span
      >
      }
      <translate-fixed [key]="tab2Label" />
    </div>
    }
  </button>
  <!-- Active Underline Indicator (Constant width cover) -->
  <div
    class="absolute bottom-0 left-0 right-0 h-0.5 bg-primary transition-all duration-200"
  ></div>
</div>
