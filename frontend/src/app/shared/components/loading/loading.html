<div [ngClass]="containerClasses[variant]">
  <!-- Spinner Wrapper -->
  <div class="relative flex items-center justify-center">
    <!-- Outer spinning circle -->
    <div
      [ngClass]="[
        'animate-spin rounded-full border-solid border-gray-200 border-t-gray-800',
        spinnerSizeClasses[size]
      ]"
    ></div>
  </div>

  <!-- Message (Optional) -->
  @if (message) {
  <p
    [ngClass]="[
        'font-medium text-gray-700 animate-pulse',
        textSizeClasses[size]
      ]"
  >
    {{ message }}
  </p>
  }
</div>
