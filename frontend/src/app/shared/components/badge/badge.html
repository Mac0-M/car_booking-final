<div [ngClass]="[baseClasses, variantClasses[variant], sizeClasses[size]]">
  <ng-content>
    @switch (variant) {
      @case ("available") {
        {{ 'Available' | translate }}
      }
      @case ("booked") {
        {{ 'Booked' | translate }}
      }
      @case ("unavailable") {
        {{ 'Unavailable' | translate }}
      }
      @case ("pending") {
        {{ 'PENDING' | translate }}
      }
    }
  </ng-content>
</div>
