<div [ngClass]="[baseClasses, variantClasses[variant]]">
  <div
    class="flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 text-gray-400 mb-4 transition-transform hover:scale-110 duration-200"
  >
    <span class="material-icons text-3xl">{{ iconMap[icon] }}</span>
  </div>

  <h3 class="text-lg md:text-xl font-semibold text-gray-800 mb-2">
    {{ title }}
  </h3>
  <p class="text-sm md:text-base text-gray-500 max-w-sm mb-6">
    {{ description }}
  </p>
</div>
