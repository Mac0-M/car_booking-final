@if (!isModal) {
<div class="space-y-4 sm:space-y-6">
  <app-booking-details
    [bookingDate]="bookingDate"
    [startTime]="startTime"
    [endTime]="endTime"
    [destination]="destination"
    [purpose]="purpose"
    [userName]="userName"
    [userPhone]="userPhone"
    [vehicle]="vehicle"
    [depart]="depart"
    [returnTime]="returnTime"
    [bookedByUser]="bookedByUser"
    [bookedForUser]="bookedForUser"
    [canEdit]="effectiveCanEdit"
    (edit)="edit.emit()"
  ></app-booking-details>
</div>
}

<!-- CDK Dialog template -->
<ng-template #dialogTemplate>
  <div
    class="relative w-full flex flex-col h-[100dvh] lg:h-auto max-h-[100dvh] lg:max-h-[90dvh] bg-white"
  >
    <!-- Modal Header -->
    <div
      class="p-3 border-b border-sand-200 flex items-center justify-between bg-white shrink-0"
    >
      <h3 class="text-lg lg:text-xl font-bold text-sand-800 px-3">
        <translate-fixed [key]="title || 'Booking Details'"/>
      </h3>
      <component-button
        variant="plain"
        size="xs"
        class="w-auto p-1"
        (click)="close.emit()"
      >
        <span class="material-icons">close</span>
      </component-button>
    </div>

    <!-- Scrollable content -->
    <div
      class="p-6 overflow-y-auto flex-1 min-h-0 space-y-3 lg:space-y-6 bg-white"
    >
      <app-booking-details
        [bookingDate]="bookingDate"
        [startTime]="startTime"
        [endTime]="endTime"
        [destination]="destination"
        [purpose]="purpose"
        [userName]="userName"
        [userPhone]="userPhone"
        [vehicle]="vehicle"
        [depart]="depart"
        [returnTime]="returnTime"
        [bookedByUser]="bookedByUser"
        [bookedForUser]="bookedForUser"
        [canEdit]="effectiveCanEdit"
        (edit)="edit.emit()"
      ></app-booking-details>
    </div>

    <!-- Modal Footer -->
    <div
      class="p-4 lg:p-6 bg-container-low border-t border-container flex flex-col gap-2 lg:gap-3 shrink-0"
    >
      @if (showMileInput()) {
      <div
        class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full"
      >
        <div class="relative flex-1">
          <input
            type="number"
            [value]="mileDistanceValue()"
            (input)="mileDistanceValue.set($any($event.target).value)"
            [placeholder]="'Enter Return Odometer Mileage' | translate"
            class="w-full px-4 py-2 border border-sand-200 rounded-xl text-sm focus:outline-none focus:border-primary transition-colors bg-white"
          />
          <span
            class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-sand-400"
            >km</span
          >
        </div>
        <component-button
          variant="danger-outline"
          size="sm"
          class="w-auto"
          (click)="cancelComplete()"
        >
          <translate-fixed key="Cancel"/>
        </component-button>
        <component-button
          variant="submit"
          size="sm"
          (click)="confirmComplete()"
        >
          <translate-fixed key="Confirm Complete"/>
        </component-button>
      </div>
      } @else {
      <div class="flex flex-col sm:flex-row sm:justify-end gap-2.5 w-full">
        @if (status === 'CONFIRMED' && canManage) {
        <component-button
          variant="danger-outline"
          size="md"
          class="flex-1 sm:w-48 font-sans"
          (click)="cancel.emit()"
        >
          <span
            class="flex items-center justify-center gap-2 text-sm sm:text-base font-semibold py-0.5 sm:py-1"
          >
            <translate-fixed key="Cancel Booking"/>
          </span>
        </component-button>
        <component-button
          variant="success"
          size="md"
          class="flex-1 sm:w-48 font-sans"
          (click)="onCompleteClick()"
        >
          <span
            class="flex items-center justify-center gap-2 text-sm sm:text-base font-semibold py-0.5 sm:py-1"
          >
            <translate-fixed key="Complete Booking"/>
          </span>
        </component-button>
        }
      </div>
      }
    </div>
  </div>
</ng-template>
