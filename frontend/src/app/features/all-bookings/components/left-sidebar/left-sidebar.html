<div class="h-full flex flex-col">
  <!-- Tabs Switcher -->
  <div
    class="px-4 pt-4 pb-3 border-b border-gray-100 flex items-center shrink-0"
  >
    <div class="flex gap-3 w-full">
      <button
        (click)="onActiveTabSelect('active')"
        [ngClass]="activeTab === 'active' ? 'border-b-2 border-gray-900 text-gray-900 font-bold' : 'text-gray-400 hover:text-gray-600'"
        class="pb-2 text-xs flex items-center gap-1 transition-all duration-200 border-0 bg-transparent cursor-pointer select-none shrink-0"
      >
        <span class="material-icons text-sm">bookmark_border</span>
        Active Bookings
      </button>
      <button
        (click)="onActiveTabSelect('history')"
        [ngClass]="activeTab === 'history' ? 'border-b-2 border-gray-900 text-gray-900 font-bold' : 'text-gray-400 hover:text-gray-600'"
        class="pb-2 text-xs flex items-center gap-1 transition-all duration-200 border-0 bg-transparent cursor-pointer select-none shrink-0"
      >
        <span class="material-icons text-sm">history</span>
        Booking History
      </button>
    </div>
  </div>

  <!-- View Mode Switcher -->
  <div class="px-4 py-3 border-b border-gray-100 flex items-center shrink-0">
    <div class="flex items-center bg-gray-100 p-0.5 rounded-xl w-full">
      @if (activeTab === 'active') {
      <button
        (click)="onViewModeSelect('calendar')"
        [class.bg-white]="viewMode === 'calendar'"
        [class.shadow-sm]="viewMode === 'calendar'"
        [class.text-gray-800]="viewMode === 'calendar'"
        [class.text-gray-500]="viewMode !== 'calendar'"
        class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer select-none border-0"
      >
        <span class="material-icons text-base">calendar_today</span>
        Calendar
      </button>
      <button
        (click)="onViewModeSelect('grid')"
        [class.bg-white]="viewMode === 'grid'"
        [class.shadow-sm]="viewMode === 'grid'"
        [class.text-gray-800]="viewMode === 'grid'"
        [class.text-gray-500]="viewMode !== 'grid'"
        class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer select-none border-0"
      >
        <span class="material-icons text-base">grid_view</span>
        Grid
      </button>
      } @else {
      <button
        (click)="onViewModeSelect('grid')"
        [class.bg-white]="viewMode === 'grid'"
        [class.shadow-sm]="viewMode === 'grid'"
        [class.text-gray-800]="viewMode === 'grid'"
        [class.text-gray-500]="viewMode !== 'grid'"
        class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer select-none border-0"
      >
        <span class="material-icons text-base">grid_view</span>
        Grid
      </button>
      <button
        (click)="onViewModeSelect('list')"
        [class.bg-white]="viewMode === 'list'"
        [class.shadow-sm]="viewMode === 'list'"
        [class.text-gray-800]="viewMode === 'list'"
        [class.text-gray-500]="viewMode !== 'list'"
        class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer select-none border-0"
      >
        <span class="material-icons text-base">format_list_bulleted</span>
        List
      </button>
      }
    </div>
  </div>

  <!-- Search & Filters -->
  <div
    class="p-4 border-b border-gray-100 flex flex-col gap-3 shrink-0 select-none"
  >
    <!-- Quick Filters -->
    @if (showLegend) {
    <div
      class="flex flex-wrap items-center gap-2 border-b border-gray-100 pb-3 mb-1 shrink-0"
    >
      @for (type of vehicleTypes; track type.value) {
      <button
        (click)="toggleVehicleType.emit(type.value)"
        [class.ring-2]="selectedVehicleTypeFilter === type.value"
        [class.ring-offset-2]="selectedVehicleTypeFilter === type.value"
        [ngClass]="selectedVehicleTypeFilter === type.value ? type.ringClass : ''"
        class="flex items-center gap-1.5 px-2 py-1 rounded-full border border-gray-200 bg-white text-xs font-semibold text-gray-700 cursor-pointer select-none transition-all active:scale-95 duration-100"
      >
        <span class="w-1.5 h-1.5 rounded-full" [ngClass]="type.dotColor"></span>
        {{ type.label }}
      </button>
      }
    </div>
    }

    <!-- Search bar and Filter toggle button -->
    <div class="flex items-center gap-2">
      <div class="relative flex-1">
        <span
          class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-base"
          >search</span
        >
        <input
          type="text"
          [value]="searchQuery"
          (input)="onSearchInput($any($event.target).value)"
          placeholder="Search..."
          class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-xl text-xs focus:outline-none focus:border-gray-400 transition-colors bg-gray-50/50"
        />
      </div>
      <button
        (click)="toggleFilters()"
        [class.bg-gray-800]="showFilters"
        [class.text-white]="showFilters"
        [class.bg-gray-50]="!showFilters"
        [class.text-gray-700]="!showFilters"
        class="px-3 py-2 rounded-xl border border-gray-200 text-xs font-bold transition-all cursor-pointer flex items-center gap-1 shrink-0 select-none"
      >
        <span class="material-icons text-sm">filter_list</span>
        Filter
      </button>
    </div>

    <!-- Collapsible Filter Options -->
    @if (showFilters) {
    <div
      class="space-y-3 pt-2 border-t border-gray-100 animate-in fade-in slide-in-from-top-1 duration-150"
    >
      <!-- Vehicle Filter -->
      <div class="space-y-1">
        <label class="text-[10px] font-bold text-gray-400 block"
          >By Vehicle</label
        >
        <select
          [value]="selectedVehicleId"
          (change)="onVehicleSelect($any($event.target).value)"
          class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400"
        >
          <option value="">All Vehicles</option>
          @for (vehicle of vehicles; track vehicle.id) {
          <option [value]="vehicle.id">{{ vehicle.model }}</option>
          }
        </select>
      </div>

      <!-- User Filter -->
      <div class="space-y-1">
        <label class="text-[10px] font-bold text-gray-400 block">By User</label>
        <select
          [value]="selectedUserId"
          (change)="onUserSelect($any($event.target).value)"
          class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400"
        >
          <option value="">All Users</option>
          @for (user of users; track user.userId) {
          <option [value]="user.userId">{{ user.userName }}</option>
          }
        </select>
      </div>

      <!-- Start Date Picker -->
      <div class="space-y-1">
        <label class="text-[10px] font-bold text-gray-400 block"
          >From Date/Time</label
        >
        <input
          type="datetime-local"
          [value]="startDate"
          (input)="onStartDateSelect($any($event.target).value)"
          class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400"
        />
      </div>

      <!-- End Date Picker -->
      <div class="space-y-1">
        <label class="text-[10px] font-bold text-gray-400 block"
          >To Date/Time</label
        >
        <input
          type="datetime-local"
          [value]="endDate"
          (input)="onEndDateSelect($any($event.target).value)"
          class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400"
        />
      </div>

      <!-- Status Filter (History only) -->
      @if (activeTab === 'history') {
      <div class="space-y-1">
        <label class="text-[10px] font-bold text-gray-400 block"
          >Booking Status</label
        >
        <select
          [value]="selectedStatusFilter"
          (change)="onStatusSelect($any($event.target).value)"
          class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400"
        >
          <option value="">All Statuses</option>
          <option value="CONFIRMED">CONFIRMED</option>
          <option value="COMPLETED">COMPLETED</option>
          <option value="CANCELLED">CANCELLED</option>
        </select>
      </div>
      }

      <!-- Action buttons -->
      <div class="flex justify-end pt-1">
        <button
          (click)="resetFilters.emit()"
          class="px-3 py-1.5 rounded-lg border border-gray-200 text-gray-700 bg-white hover:bg-gray-50 transition-all text-[11px] font-semibold cursor-pointer"
        >
          Clear Filters
        </button>
      </div>
    </div>
    }
  </div>

  <!-- Spacer -->
  <div class="flex-1"></div>

  <!-- Add New Booking Button (Bottom of Sidebar) -->
  <div class="p-4 border-t border-gray-100 shrink-0">
    <component-button
      (click)="addBooking.emit()"
      variant="submit"
      size="lg"
      class="w-full"
    >
      <span class="material-icons text-sm">add</span>
      Add new book
    </component-button>
  </div>
</div>
