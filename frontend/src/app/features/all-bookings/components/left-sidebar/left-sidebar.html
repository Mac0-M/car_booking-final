<div class="h-full flex flex-col bg-white">
  <!-- Drawer Header -->
  <div class="px-4 py-4 border-b border-gray-100 flex items-center justify-between shrink-0 select-none">
    <div class="flex items-center gap-2">
      <span class="material-icons text-gray-500 text-lg">filter_list</span>
      <h3 class="text-sm font-bold text-gray-900">Search & Filters / ค้นหาและกรอง</h3>
    </div>
    <component-button
      (click)="close.emit()"
      variant="plain"
      size="xs"
      class="w-auto p-1 text-gray-400 hover:text-gray-600"
    >
      <span class="material-icons">close</span>
    </component-button>
  </div>

  <!-- Filters Content -->
  <div class="p-4 flex flex-col gap-3 shrink-0 select-none">
    <!-- Quick Filters (Car Types) -->
    <div class="flex flex-wrap items-center gap-2 border-b border-gray-100 pb-3 mb-1 shrink-0">
      @for (type of vehicleTypes; track type.value) {
      <button
        (click)="toggleVehicleType.emit(type.value)"
        [class.ring-2]="selectedVehicleTypeFilter === type.value"
        [class.ring-offset-2]="selectedVehicleTypeFilter === type.value"
        [ngClass]="selectedVehicleTypeFilter === type.value ? type.ringClass : ''"
        class="flex items-center gap-1.5 px-2 py-1 rounded-full border border-gray-200 bg-white text-xs font-semibold text-gray-700 cursor-pointer select-none transition-all active:scale-95 duration-100"
      >
        <span class="w-1.5 h-1.5 rounded-full" [ngClass]="type.dotColor"></span>
        {{ type.label }}
      </button>
      }
    </div>

    <!-- Search Bar -->
    <div class="relative w-full">
      <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">search</span>
      <input
        type="text"
        [value]="searchQuery"
        (input)="searchQueryChange.emit($any($event.target).value)"
        placeholder="Search..."
        class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors bg-gray-50/50 font-sans"
      />
    </div>

    <!-- User Filter -->
    <div class="space-y-1">
      <label class="text-[10px] font-bold text-gray-400 block">Filter by User / กรองตามผู้ใช้</label>
      <select
        [ngModel]="selectedUserId"
        (ngModelChange)="selectedUserIdChange.emit($event)"
        class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400 font-sans"
      >
        <option value="">All Users / ผู้ใช้งานทั้งหมด</option>
        @for (user of users; track user.userId) {
        <option [value]="user.userId">{{ user.userName }}</option>
        }
      </select>
    </div>

    <!-- Start Date Picker -->
    <div class="space-y-1">
      <label class="text-[10px] font-bold text-gray-400 block">From Date/Time / ตั้งแต่วันเวลา</label>
      <input
        type="datetime-local"
        [value]="startDate"
        (input)="startDateChange.emit($any($event.target).value)"
        class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400 font-sans"
      />
    </div>

    <!-- End Date Picker -->
    <div class="space-y-1">
      <label class="text-[10px] font-bold text-gray-400 block">To Date/Time / ถึงวันเวลา</label>
      <input
        type="datetime-local"
        [value]="endDate"
        (input)="endDateChange.emit($any($event.target).value)"
        class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400 font-sans"
      />
    </div>

    <!-- Optional Status Filter -->
    @if (showStatusFilter) {
    <div class="space-y-1">
      <label class="text-[10px] font-bold text-gray-400 block">Booking Status / สถานะการจอง</label>
      <select
        [ngModel]="selectedStatusFilter"
        (ngModelChange)="selectedStatusFilterChange.emit($event)"
        class="w-full px-2.5 py-1.5 border border-gray-200 rounded-lg text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400 font-sans"
      >
        <option value="">All Statuses / สถานะทั้งหมด</option>
        <option value="CONFIRMED">CONFIRMED / ยืนยันแล้ว (กำลังมาถึง)</option>
        <option value="COMPLETED">COMPLETED / เสร็จสิ้น</option>
        <option value="CANCELLED">CANCELLED / ยกเลิกแล้ว</option>
      </select>
    </div>
    }

    <!-- Action Buttons -->
    <div class="flex items-center justify-end gap-2 pt-2 border-t border-gray-100">
      <component-button
        (click)="resetFilters.emit()"
        variant="cancel"
        size="xs"
        class="w-auto font-sans"
      >
        Clear Filters
      </component-button>
    </div>
  </div>
</div>
