<div
  [class.bg-white]="!flat"
  [class.p-1.5]="!flat"
  [class.sm:p-2.5]="!flat"
  [class.rounded-2xl]="!flat"
  [class.border]="!flat"
  [class.border-gray-100]="!flat"
  [class.shadow-sm]="!flat"
  class="calendar-view relative overflow-hidden h-full flex flex-col w-full"
  [style.min-height]="minHeight"
>
  <!-- Calendar Controls -->
  @if (showControls) {
  <div
    class="flex flex-row items-center justify-between gap-1 sm:gap-3 mb-4 bg-gray-50 p-1 sm:p-2 rounded-xl border border-gray-100 shrink-0"
  >
    <!-- Navigation Buttons & Month/Year Display -->
    <div class="flex items-center gap-1 sm:gap-2.5 justify-start">
      <div class="flex items-center gap-0.5 sm:gap-1.5">
        <button
          (click)="prev()"
          class="p-0.5 sm:p-2 rounded-md sm:rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-200 hover:text-black cursor-pointer active:scale-95 transition-all flex items-center justify-center select-none"
        >
          <span class="material-icons text-[10px] sm:text-base"
            >chevron_left</span
          >
        </button>
        <button
          (click)="today()"
          class="px-1.5 py-1 sm:px-4 sm:py-1.5 rounded-md sm:rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-200 hover:text-black font-bold text-[9px] sm:text-xs cursor-pointer active:scale-95 transition-all select-none"
        >
          Today
        </button>
        <button
          (click)="next()"
          class="p-0.5 sm:p-2 rounded-md sm:rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-200 hover:text-black cursor-pointer active:scale-95 transition-all flex items-center justify-center select-none"
        >
          <span class="material-icons text-[10px] sm:text-base"
            >chevron_right</span
          >
        </button>
      </div>

      <!-- Month & Year Display (Click to open date picker) -->
      <div
        class="relative flex items-center gap-1 text-gray-700 ml-0.5 sm:ml-1.5 select-none shrink-0 cursor-pointer hover:text-gray-900 transition-colors"
      >
        <span
          class="text-[10px] sm:text-base font-bold tracking-wide whitespace-nowrap flex items-center gap-0.5"
        >
          {{ monthYearLabel }}
          <span class="material-icons text-xs sm:text-sm text-gray-400"
            >arrow_drop_down</span
          >
        </span>
        <input
          type="date"
          (change)="onDateInputChange($event)"
          class="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
          title="Choose Date / เลือกวันที่"
        />
      </div>
    </div>

    <!-- View Mode Switcher -->

    <div class="flex items-center shrink-0 justify-end">
      <div
        class="bg-gray-200 p-0.5 rounded-md sm:rounded-lg flex items-center gap-0.5"
      >
        <button
          (click)="changeView('month')"
          [class.bg-white]="calendarView === 'month'"
          [class.shadow-sm]="calendarView === 'month'"
          [class.text-gray-800]="calendarView === 'month'"
          [class.text-gray-500]="calendarView !== 'month'"
          class="inline-flex items-center justify-center px-1.5 py-1 sm:px-3.5 sm:py-1.5 rounded-md text-[9px] sm:text-xs font-bold transition-all cursor-pointer select-none border-0"
        >
          Month
        </button>
        <button
          (click)="changeView('week')"
          [class.bg-white]="calendarView === 'week'"
          [class.shadow-sm]="calendarView === 'week'"
          [class.text-gray-800]="calendarView === 'week'"
          [class.text-gray-500]="calendarView !== 'week'"
          class="inline-flex items-center justify-center px-1.5 py-1 sm:px-3.5 sm:py-1.5 rounded-md text-[9px] sm:text-xs font-bold transition-all cursor-pointer select-none border-0"
        >
          Week
        </button>
        <button
          (click)="changeView('day')"
          [class.bg-white]="calendarView === 'day'"
          [class.shadow-sm]="calendarView === 'day'"
          [class.text-gray-800]="calendarView === 'day'"
          [class.text-gray-500]="calendarView !== 'day'"
          class="inline-flex items-center justify-center px-1.5 py-1 sm:px-3.5 sm:py-1.5 rounded-md text-[9px] sm:text-xs font-bold transition-all cursor-pointer select-none border-0"
        >
          Day
        </button>
      </div>
    </div>
  </div>
  }

  <!-- TUI Container -->
  <div
    [id]="calendarId"
    class="flex-1 min-h-0 w-full"
    [style.height]="height"
  ></div>
</div>
