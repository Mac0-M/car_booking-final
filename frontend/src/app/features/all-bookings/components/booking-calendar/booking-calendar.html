<div class="calendar-view bg-white p-4 rounded-2xl border border-gray-100 shadow-sm relative overflow-hidden h-full flex flex-col" [style.min-height]="minHeight">
  <!-- Legend -->
  @if (showLegend) {
    <div class="flex flex-wrap items-center gap-4 mb-4 text-xs font-bold text-gray-500 border-b border-gray-100 pb-3 shrink-0">
      <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-blue-500"></span> Sedan</span>
      <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-red-500"></span> Pickup</span>
      <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-orange-500"></span> Van</span>
      <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-emerald-500"></span> SUV</span>
      <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-violet-500"></span> Other</span>
    </div>
  }

  <!-- Calendar Controls -->
  <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3 mb-4 bg-gray-50 p-2 rounded-xl border border-gray-100 shrink-0">
    <!-- Navigation Buttons -->
    <div class="flex items-center gap-1.5 justify-center sm:justify-start">
      <button (click)="prev()"
              class="p-2 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black cursor-pointer active:scale-95 transition-all flex items-center justify-center select-none">
        <span class="material-icons text-base">chevron_left</span>
      </button>
      <button (click)="today()"
              class="px-4 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black font-bold text-xs cursor-pointer active:scale-95 transition-all select-none">
        Today
      </button>
      <button (click)="next()"
              class="p-2 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black cursor-pointer active:scale-95 transition-all flex items-center justify-center select-none">
        <span class="material-icons text-base">chevron_right</span>
      </button>
    </div>

    <!-- Fast Vehicle Type Filter Buttons -->
    @if (showQuickFilters) {
      <div class="flex flex-wrap items-center gap-1.5 justify-center sm:justify-end">
        @for (type of vehicleTypes; track type.value) {
          <button (click)="toggleVehicleType.emit(type.value)"
                  [class.ring-2]="selectedVehicleTypeFilter === type.value"
                  [class.ring-offset-2]="selectedVehicleTypeFilter === type.value"
                  [class]="'flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-gray-200 bg-white text-xs font-bold text-gray-700 cursor-pointer transition-all select-none ' + (selectedVehicleTypeFilter === type.value ? type.ringClass : '')">
            <span [class]="'w-2 h-2 rounded-full ' + type.dotColor"></span> {{ type.label }}
          </button>
        }
      </div>
    }
  </div>

  <!-- TUI Container -->
  <div [id]="calendarId" class="flex-1 min-h-0 w-full" [style.height]="height"></div>
</div>
