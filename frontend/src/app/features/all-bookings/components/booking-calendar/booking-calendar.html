<div
  class="calendar-view bg-white p-4 rounded-2xl border border-gray-100 shadow-sm relative overflow-hidden h-full flex flex-col"
  [style.min-height]="minHeight"
>
  <!-- Calendar Controls -->
  <div
    class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3 mb-4 bg-gray-50 p-2 rounded-xl border border-gray-100 shrink-0"
  >
    <!-- Navigation Buttons & Month/Year Display -->
    <div class="flex items-center gap-3 justify-center sm:justify-start">
      <div class="flex items-center gap-1.5">
        <button
          (click)="prev()"
          class="p-2 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black cursor-pointer active:scale-95 transition-all flex items-center justify-center select-none"
        >
          <span class="material-icons text-base">chevron_left</span>
        </button>
        <button
          (click)="today()"
          class="px-4 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black font-bold text-xs cursor-pointer active:scale-95 transition-all select-none"
        >
          Today
        </button>
        <button
          (click)="next()"
          class="p-2 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black cursor-pointer active:scale-95 transition-all flex items-center justify-center select-none"
        >
          <span class="material-icons text-base">chevron_right</span>
        </button>
      </div>

      <!-- Month & Year Display -->
      <div class="flex items-center gap-1.5 text-gray-700 ml-1.5 select-none">
        <span class="text-sm sm:text-base font-bold tracking-wide">
          {{ monthYearLabel }}
        </span>
      </div>
    </div>

    <!-- View Mode Switcher -->

    <div class="flex items-center shrink-0 justify-center">
      <div class="bg-gray-200 p-0.5 rounded-lg">
        <button
          (click)="changeView('month')"
          [class.bg-white]="calendarView === 'month'"
          [class.shadow-sm]="calendarView === 'month'"
          [class.text-gray-800]="calendarView === 'month'"
          [class.text-gray-500]="calendarView !== 'month'"
          class="px-3.5 py-1.5 rounded-md text-xs font-bold transition-all cursor-pointer select-none border-0"
        >
          Month
        </button>
        <button
          (click)="changeView('week')"
          [class.bg-white]="calendarView === 'week'"
          [class.shadow-sm]="calendarView === 'week'"
          [class.text-gray-800]="calendarView === 'week'"
          [class.text-gray-500]="calendarView !== 'week'"
          class="px-3.5 py-1.5 rounded-md text-xs font-bold transition-all cursor-pointer select-none border-0"
        >
          Week
        </button>
        <button
          (click)="changeView('day')"
          [class.bg-white]="calendarView === 'day'"
          [class.shadow-sm]="calendarView === 'day'"
          [class.text-gray-800]="calendarView === 'day'"
          [class.text-gray-500]="calendarView !== 'day'"
          class="px-3.5 py-1.5 rounded-md text-xs font-bold transition-all cursor-pointer select-none border-0"
        >
          Day
        </button>
      </div>
    </div>
  </div>

  <!-- TUI Container -->
  <div
    [id]="calendarId"
    class="flex-1 min-h-0 w-full"
    [style.height]="height"
  ></div>
</div>
