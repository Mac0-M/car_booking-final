<!-- Mobile Filter Trigger Button -->
@if (isMobileHeader) {
<button
  (click)="openMobileFilters()"
  [class.bg-gray-700]="activeFiltersCount > 0"
  [class.text-white]="activeFiltersCount > 0"
  [class.bg-white]="activeFiltersCount === 0"
  [class.text-gray-700]="activeFiltersCount === 0"
  [class.border-gray-700]="activeFiltersCount > 0"
  [class.border-gray-200]="activeFiltersCount === 0"
  class="flex items-center justify-center gap-1.5 px-3.5 py-1.5 rounded-xl border text-xs font-bold transition-all cursor-pointer select-none active:scale-95 shadow-sm min-h-[32px]"
>
  <span class="material-icons text-base">filter_list</span>
  <span>Filter</span>
  @if (activeFiltersCount > 0) {
  <span
    class="flex items-center justify-center bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full"
  >
    {{ activeFiltersCount }}
  </span>
  }
</button>
}

<!-- Mobile Filters Modal/Popup -->
@if (isMobileHeader && showMobileFiltersPopup()) {
<div class="fixed inset-0 z-50 flex items-end justify-center select-none">
  <!-- Backdrop -->
  <div
    (click)="closeMobileFilters()"
    class="absolute inset-0 bg-gray-700/60 backdrop-blur-sm transition-opacity duration-300 animate-in fade-in"
  ></div>

  <!-- Modal Panel (Bottom sheet on mobile) -->
  <div
    class="relative w-full bg-white rounded-t-3xl shadow-2xl z-10 flex flex-col max-h-[85vh] animate-in slide-in-from-bottom duration-300 border-t border-gray-100"
  >
    <!-- Drag Indicator / Accent bar at top of bottom-sheet -->
    <div class="flex justify-center py-2.5 shrink-0">
      <div class="w-12 h-1 bg-gray-300 rounded-full"></div>
    </div>

    <!-- Header -->
    <div
      class="px-5 pb-3 border-b border-gray-100 flex items-center justify-between shrink-0"
    >
      <h3 class="text-sm font-bold text-gray-900 flex items-center gap-1.5">
        <span class="material-icons text-base text-gray-500">search</span>
        <span>Search & Filters / ค้นหาและกรอง</span>
      </h3>
      <button
        (click)="closeMobileFilters()"
        class="p-1 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors border-0 bg-transparent cursor-pointer"
      >
        <span class="material-icons text-base">close</span>
      </button>
    </div>

    <!-- Content (Scrollable) -->
    <div class="flex-1 overflow-y-auto p-5 space-y-4">
      <!-- Quick Filters (Car Types) -->
      @if (showLegend) {
      <div class="space-y-1.5">
        <label
          class="text-[10px] font-bold text-gray-400 block uppercase tracking-wider"
          >Vehicle Type / ประเภทรถ</label
        >
        <div class="flex flex-wrap items-center gap-2">
          @for (type of vehicleTypes; track type.value) {
          <button
            (click)="toggleVehicleType.emit(type.value)"
            [class.ring-2]="selectedVehicleTypeFilter === type.value"
            [class.ring-offset-2]="selectedVehicleTypeFilter === type.value"
            [ngClass]="selectedVehicleTypeFilter === type.value ? type.ringClass : ''"
            class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-full border border-gray-200 bg-white text-xs font-semibold text-gray-700 cursor-pointer select-none transition-all active:scale-95 duration-100"
          >
            <span
              class="w-1.5 h-1.5 rounded-full"
              [ngClass]="type.dotColor"
            ></span>
            {{ type.label }}
          </button>
          }
        </div>
      </div>
      }

      <app-booking-filters
        [searchQuery]="searchQuery"
        [selectedUserId]="selectedUserId"
        [startDate]="startDate"
        [endDate]="endDate"
        [selectedStatusFilter]="selectedStatusFilter"
        [showStatusFilter]="activeTab === 'history'"
        [vehicles]="vehicles"
        [users]="users"
        [forceExpanded]="true"
        (searchQueryChange)="onSearchInput($event)"
        (selectedUserIdChange)="onUserSelect($event)"
        (startDateChange)="onStartDateSelect($event)"
        (endDateChange)="onEndDateSelect($event)"
        (selectedStatusFilterChange)="onStatusSelect($event)"
        (reset)="resetFilters.emit()"
      />
    </div>

    <!-- Footer / Actions -->
    <div
      class="px-5 py-4 border-t border-gray-100 bg-gray-50/50 flex items-center justify-between gap-3 shrink-0"
    >
      <button
        (click)="resetFilters.emit(); closeMobileFilters()"
        class="px-4 py-2 rounded-xl border border-gray-200 text-gray-600 bg-white hover:bg-gray-50 text-xs font-semibold cursor-pointer active:scale-95 transition-all flex-1 text-center"
      >
        Clear Filters
      </button>
      <button
        (click)="closeMobileFilters()"
        class="px-5 py-2 rounded-xl bg-gray-700 text-white text-xs font-semibold hover:bg-gray-800 cursor-pointer active:scale-95 transition-all flex-1 text-center"
      >
        Apply
      </button>
    </div>
  </div>
</div>
}
