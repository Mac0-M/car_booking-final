<!-- Sidebar Header -->
<div
  class="px-4 py-2.5 border-b border-sand-100 flex items-center justify-between shrink-0 select-none bg-white font-sans"
>
  <div class="flex items-center gap-3">
    <p class="text-sm text-sand-700 font-bold">
      {{ 'Daily Bookings for' | translate }} {{ selectedDailyDate | appDate }}
    </p>
  </div>
  <component-button
    (click)="close.emit()"
    variant="plain"
    size="xs"
    class="w-auto -mr-3"
  >
    <span class="material-icons">close</span>
  </component-button>
</div>

<!-- Sidebar Body -->
<div class="flex-1 min-h-0 bg-white p-4 md:p-6 flex flex-col font-sans">
  @if (dailyBookings && dailyBookings.length > 0) {
  <app-booking-calendar
    class="w-full flex flex-col h-full flex-1 min-h-0"
    [calendarId]="'daily-view-calendar'"
    defaultView="day"
    height="100%"
    minHeight="0"
    [showLegend]="false"
    [bookings]="dailyBookings"
    [currentDate]="selectedDailyDate || ''"
    [showControls]="false"
    [flat]="true"
    (bookingClick)="bookingClick.emit($event)"
  />
  } @else {
  <div
    class="h-full flex items-center justify-center bg-sand-50/50 rounded-2xl border border-dashed border-sand-200 p-8"
  >
    <component-empty-state
      [title]="'No bookings for this day' | translate"
      [description]="'No vehicles booked on this day / ไม่มีรถยนต์คันใดถูกจองในวันที่คุณเลือก' | translate"
      icon="calendar"
      variant="default"
    ></component-empty-state>
  </div>
  }
</div>
