<component-mobile-filters
  [activeFiltersCount]="activeFiltersCount"
  [showTrigger]="isMobileHeader"
  (open)="onOpenFilters()"
  (apply)="applyFilters()"
  (clear)="clearAllFilters()"
>
  <!-- Content (Scrollable) -->
  <div class="space-y-3.5">
    <!-- Quick Filters (Car Types) -->
    @if (showLegend) {
    <div class="space-y-1.5">
      <label
        class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
        ><translate-fixed key="Vehicle Type / ประเภทรถ"/></label
      >
      <div class="flex flex-wrap items-center gap-2">
        @for (type of vehicleTypes; track type.value) {
        <button
          component-filter-pill
          [label]="type.label | translate"
          [active]="localSelectedVehicleTypeFilter.includes(type.value)"
          [dotColor]="type.dotColor"
          [ringClass]="type.ringClass"
          size="md"
          (click)="toggleLocalVehicleType(type.value)"
        ></button>
        }
      </div>
    </div>

    <!-- License Plate Pills -->
    @if (localSelectedVehicleTypeFilter.length > 0 &&
    localFilteredVehiclesForPills.length > 0) {
    <div
      class="space-y-1.5 pt-1.5 animate-in fade-in slide-in-from-top-1 duration-150"
    >
      <label
        class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
        ><translate-fixed key="License Plate / ทะเบียนรถ"/></label
      >
      <div class="flex flex-wrap items-center gap-2">
        @for (vehicle of localFilteredVehiclesForPills; track vehicle.id) {
        <button
          component-filter-pill
          [label]="vehicle.plateNumber + ' (' + vehicle.model + ')'"
          [active]="localSelectedVehiclePlates.includes(vehicle.id)"
          [dotColor]="getVehicleColor(vehicle).dotColor"
          [ringClass]="getVehicleColor(vehicle).ringClass"
          size="md"
          (click)="toggleLocalVehiclePlate(vehicle.id)"
        ></button>
        }
      </div>
    </div>
    } }

    <app-filter-sidebar
      [selectedDate]="localSelectedDate"
      [searchQuery]="localSearchQuery"
      [selectedUserId]="localSelectedUserId"
      [startDate]="localStartDate"
      [endDate]="localEndDate"
      [selectedStatusFilter]="localSelectedStatusFilter"
      [showStatusFilter]="activeTab === 'history'"
      [vehicles]="vehicles"
      [users]="users"
      (selectedDateChange)="localSelectedDate = $event"
      (searchQueryChange)="localSearchQuery = $event"
      (selectedUserIdChange)="localSelectedUserId = $event"
      (startDateChange)="localStartDate = $event"
      (endDateChange)="localEndDate = $event"
      (selectedStatusFilterChange)="localSelectedStatusFilter = $event"
      (reset)="localSearchQuery = ''; localSelectedUserId = ''; localStartDate = ''; localEndDate = ''; localSelectedStatusFilter = ''; localSelectedVehicleTypeFilter = []; localSelectedVehiclePlates = []; localSelectedDate = ''"
    />
  </div>
</component-mobile-filters>
