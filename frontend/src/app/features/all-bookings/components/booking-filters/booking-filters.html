<!-- Search, Filters and View Toggle Bar -->
<div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-white p-3 rounded-2xl border border-gray-100 shadow-sm w-full">
  <!-- Search Bar + Toggle -->
  <div class="flex items-center gap-2 w-full md:w-auto flex-1">
    <div class="relative flex-1 max-w-md">
      <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">search</span>
      <input type="text"
             [value]="searchQuery"
             (input)="searchQueryChange.emit($any($event.target).value)"
             [placeholder]="placeholder"
             class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-gray-400 transition-colors bg-gray-50/50" />
    </div>
    <button (click)="showAdvancedFilters.set(!showAdvancedFilters())"
            [class.bg-gray-800]="showAdvancedFilters()"
            [class.text-white]="showAdvancedFilters()"
            [class.bg-gray-50]="!showAdvancedFilters()"
            [class.text-gray-700]="!showAdvancedFilters()"
            class="px-3.5 py-2.5 rounded-xl border border-gray-200 text-xs font-bold transition-all cursor-pointer flex items-center gap-1.5 shrink-0 select-none">
      <span class="material-icons text-base">filter_list</span>
      Filters
    </button>
  </div>

  <!-- View Mode Toggle -->
  @if (viewModes.length > 0) {
    <div class="flex items-center bg-gray-100 p-1 rounded-xl shrink-0">
      @for (mode of viewModes; track mode) {
        <button (click)="viewModeChange.emit(mode)"
                [class.bg-white]="currentViewMode === mode"
                [class.shadow-sm]="currentViewMode === mode"
                [class.text-gray-800]="currentViewMode === mode"
                [class.text-gray-500]="currentViewMode !== mode"
                [class.hidden]="mode === 'list'"
                [class.md:flex]="mode === 'list'"
                [class.flex]="mode !== 'list'"
                class="items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer select-none border-0">
          <span class="material-icons text-base">{{ getModeIcon(mode) }}</span>
          {{ getModeLabel(mode) }}
        </button>
      }
    </div>
  }
</div>

<!-- Advanced Filters Panel -->
@if (showAdvancedFilters()) {
  <div class="bg-white p-4 rounded-2xl border border-gray-150 shadow-sm grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 animate-in fade-in slide-in-from-top-1 duration-150 w-full mt-4">
    <!-- Vehicle Filter -->
    <div class="space-y-1.5">
      <label class="text-xs font-bold text-gray-400 block">Filter by Vehicle / กรองตามยานพาหนะ</label>
      <select [value]="selectedVehicleId"
              (change)="selectedVehicleIdChange.emit($any($event.target).value)"
              class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400">
        <option value="">All Vehicles / ยานพาหนะทั้งหมด</option>
        @for (vehicle of vehicles; track vehicle.id) {
          <option [value]="vehicle.id">{{ vehicle.model }}</option>
        }
      </select>
    </div>

    <!-- User Filter -->
    <div class="space-y-1.5">
      <label class="text-xs font-bold text-gray-400 block">Filter by User / กรองตามผู้ใช้</label>
      <select [value]="selectedUserId"
              (change)="selectedUserIdChange.emit($any($event.target).value)"
              class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400">
        <option value="">All Users / ผู้ใช้งานทั้งหมด</option>
        @for (user of users; track user.userId) {
          <option [value]="user.userId">{{ user.userName }}</option>
        }
      </select>
    </div>

    <!-- Start Date Picker (datetime-local) -->
    <div class="space-y-1.5">
      <label class="text-xs font-bold text-gray-400 block">From Date/Time / ตั้งแต่วันเวลา</label>
      <input type="datetime-local"
             [value]="startDate"
             (input)="startDateChange.emit($any($event.target).value)"
             class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400" />
    </div>

    <!-- End Date Picker (datetime-local) -->
    <div class="space-y-1.5">
      <label class="text-xs font-bold text-gray-400 block">To Date/Time / ถึงวันเวลา</label>
      <input type="datetime-local"
             [value]="endDate"
             (input)="endDateChange.emit($any($event.target).value)"
             class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400" />
    </div>

    <!-- Optional Status Filter (History Page only) -->
    @if (showStatusFilter) {
      <div class="space-y-1.5 sm:col-span-2 md:col-span-2">
        <label class="text-xs font-bold text-gray-400 block">Booking Status / สถานะการจอง</label>
        <select [value]="selectedStatusFilter"
                (change)="selectedStatusFilterChange.emit($any($event.target).value)"
                class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400">
          <option value="">All Statuses / สถานะทั้งหมด</option>
          <option value="CONFIRMED">CONFIRMED / ยืนยันแล้ว (กำลังมาถึง)</option>
          <option value="COMPLETED">COMPLETED / เสร็จสิ้น</option>
          <option value="CANCELLED">CANCELLED / ยกเลิกแล้ว</option>
        </select>
      </div>
    }

    <!-- Action Buttons -->
    <div [class]="showStatusFilter ? 'sm:col-span-2 md:col-span-2 flex items-end justify-end gap-2' : 'col-span-1 sm:col-span-2 md:col-span-4 flex items-end justify-end gap-2 pt-2 border-t border-gray-50'" >
      <button (click)="reset.emit()"
              class="px-4 py-2 rounded-xl border border-gray-200 text-gray-700 bg-white hover:bg-gray-50 transition-all text-xs font-semibold cursor-pointer">
        Clear Filters
      </button>
    </div>
  </div>
}
