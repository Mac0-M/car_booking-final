<div class="my-bookings-page max-w-5xl mx-auto p-4 md:p-6 space-y-6">
  
  <!-- Page Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-black text-gray-800 flex items-center gap-2">
        <span class="material-icons text-gray-700">bookmark_border</span>
        Vehicle Bookings
      </h1>
      <p class="text-sm text-gray-500 mt-1">View all vehicle bookings and usage status of all users.</p>
    </div>
    
    <div class="flex items-center gap-2">
      <component-button variant="submit" size="sm" class="sm:w-auto" routerLink="/booking/form">
        <span class="flex items-center gap-2 text-sm font-semibold">
          <span class="material-icons text-base">add</span>
          Book New Vehicle
        </span>
      </component-button>
    </div>
  </div>
  <app-booking-filters
    [vehicles]="vehiclesList()"
    [users]="usersList()"
    [viewModes]="['calendar', 'grid']"
    [currentViewMode]="viewMode()"
    [searchQuery]="searchQuery()"
    [selectedVehicleId]="selectedVehicleId()"
    [selectedUserId]="selectedUserId()"
    [startDate]="startDate()"
    [endDate]="endDate()"
    [placeholder]="'Search destination, booker, purpose...'"
    (searchQueryChange)="searchQuery.set($event)"
    (selectedVehicleIdChange)="selectedVehicleId.set($event); onFilterChange()"
    (selectedUserIdChange)="selectedUserId.set($event); onFilterChange()"
    (startDateChange)="startDate.set($event); onFilterChange()"
    (endDateChange)="endDate.set($event); onFilterChange()"
    (viewModeChange)="setViewMode($event)"
    (reset)="resetFilters()"
  />
  <!-- View Area -->
  @if (viewMode() === 'calendar') {
    <div class="pt-10">
      <app-booking-calendar
        [bookings]="filteredBookings()"
        (bookingClick)="openDetail($event)"
      />
    </div>
  } @else {
    <!-- Bookings List Grid (Grid View) -->
    @if (filteredBookings().length > 0) {
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in duration-200">
        @for (booking of filteredBookings(); track booking.id) {
          <app-booking-card
            [booking]="booking"
            (click)="openDetail(booking)"
            class="pt-10"
          />
        }
      </div>
    } @else {
      <!-- Empty State -->
      <div class="py-8 flex flex-col items-center">
        <div class="w-full">
          <component-empty-state
            title="No bookings found"
            description="There are currently no vehicle bookings matching the selected filters."
            icon="search"
            variant="card">
          </component-empty-state>
        </div>
      </div>
    }
  }

  <!-- Detail Modal Dialog popup -->
  <app-booking-detail-modal
    [title]="'Booking Details'"
    [description]="'Summary of vehicle bookings and usage in the system'"
    [bookingDate]="selectedBooking()?.bookingDate || ''"
    [startTime]="selectedBooking()?.startTime || ''"
    [endTime]="selectedBooking()?.endTime || ''"
    [destination]="selectedBooking()?.destination || ''"
    [purpose]="selectedBooking()?.purpose || ''"
    [userName]="selectedBooking()?.userName || ''"
    [userPhone]="selectedBooking()?.userPhone || ''"
    [vehicle]="selectedBooking()?.vehicle || null"
    [status]="selectedBooking()?.status || 'CONFIRMED'"
    [depart]="selectedBooking()?.depart || ''"
    [returnTime]="selectedBooking()?.return || ''"
    [bookedByUser]="selectedBooking()?.bookedByUser || null"
    [bookedForUser]="selectedBooking()?.bookedForUser || null"

    [isModal]="true"
    [isOpen]="isModalOpen()"
    (close)="closeDetail()"
    (cancel)="onCancelBooking(selectedBooking()?.id || '')"
    (complete)="onCompleteBooking(selectedBooking()?.id || '', $event)"
  />
</div>
