@if (isMobile()) {
<!-- Mobile layout: Controls on top, Calendar/Grid in middle, Add Booking at bottom -->
<div
  class="h-[calc(100dvh-4rem)] w-full flex flex-col bg-gray-100/40 overflow-hidden"
>
  <!-- Top Area: Sidebar Controls (Tabs, Switchers, Filters) -->
  <div class="w-full bg-white border-b border-gray-200 shrink-0">
    <app-left-sidebar
      [activeTab]="activeTab()"
      [viewMode]="viewMode()"
      [searchQuery]="searchQuery()"
      [selectedUserId]="selectedUserId()"
      [startDate]="startDate()"
      [endDate]="endDate()"
      [selectedStatusFilter]="selectedStatusFilter()"
      [showFilters]="showFilters()"
      [showLegend]="true"
      [selectedVehicleTypeFilter]="selectedVehicleTypeFilter()"
      [vehicles]="vehiclesList()"
      [users]="usersList()"
      [isMobile]="isMobile()"
      [isMobileHeader]="true"
      (activeTabChange)="setActiveTab($event)"
      (viewModeChange)="viewMode.set($event)"
      (searchQueryChange)="searchQuery.set($event)"
      (selectedUserIdChange)="selectedUserId.set($event)"
      (startDateChange)="startDate.set($event)"
      (endDateChange)="endDate.set($event)"
      (selectedStatusFilterChange)="selectedStatusFilter.set($event)"
      (showFiltersChange)="showFilters.set($event)"
      (filterChange)="onFilterChange()"
      (resetFilters)="resetFilters()"
      (addBooking)="openBooking()"
      (toggleVehicleType)="toggleVehicleType($event)"
    />
  </div>

  <!-- Middle Area: Dynamic Views (Calendar, Grid, List) -->
  <div
    class="flex-1 min-h-0 w-full flex flex-col p-4 space-y-3 overflow-hidden"
  >
    <!-- Views Render Area -->
    <app-booking-views
      class="flex-1 min-h-0 w-full flex flex-col overflow-hidden"
      [activeTab]="activeTab()"
      [viewMode]="viewMode()"
      [bookings]="filteredBookings()"
      [selectedVehicleTypeFilter]="selectedVehicleTypeFilter()"
      [isMobile]="isMobile()"
      (toggleVehicleType)="toggleVehicleType($event)"
      (bookingClick)="openDetail($event)"
      (dateSelect)="onDateSelected($event)"
    />
  </div>

  <!-- Bottom Area: Sticky Add Booking Button -->
  <div class="p-4 border-t border-gray-200 bg-white shrink-0">
    <component-button
      (click)="openBooking()"
      variant="submit"
      size="lg"
      class="w-full"
    >
      <span class="material-icons text-sm">add</span>
      Add new book
    </component-button>
  </div>
</div>
} @else {
<mat-drawer-container
  [hasBackdrop]="isMobile()"
  class="h-[calc(100dvh-4rem)] w-full bg-gray-100/40 overflow-hidden!"
>
  <!-- Left Sidebar Drawer: Tabs, Views, Filters & Add Booking -->
  <mat-drawer
    #leftDrawer
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="leftDrawerOpened()"
    class="w-72 border-r border-gray-200 bg-white shadow-sm"
  >
    <app-left-sidebar
      [activeTab]="activeTab()"
      [viewMode]="viewMode()"
      [searchQuery]="searchQuery()"
      [selectedUserId]="selectedUserId()"
      [startDate]="startDate()"
      [endDate]="endDate()"
      [selectedStatusFilter]="selectedStatusFilter()"
      [showFilters]="showFilters()"
      [showLegend]="true"
      [selectedVehicleTypeFilter]="selectedVehicleTypeFilter()"
      [vehicles]="vehiclesList()"
      [users]="usersList()"
      [isMobile]="isMobile()"
      (activeTabChange)="setActiveTab($event)"
      (viewModeChange)="viewMode.set($event)"
      (searchQueryChange)="searchQuery.set($event)"
      (selectedUserIdChange)="selectedUserId.set($event)"
      (startDateChange)="startDate.set($event)"
      (endDateChange)="endDate.set($event)"
      (selectedStatusFilterChange)="selectedStatusFilter.set($event)"
      (showFiltersChange)="showFilters.set($event)"
      (filterChange)="onFilterChange()"
      (resetFilters)="resetFilters()"
      (addBooking)="openBooking()"
      (closeDrawer)="leftDrawer.close()"
      (toggleVehicleType)="toggleVehicleType($event)"
    />
  </mat-drawer>

  <!-- Center Content Area -->
  <mat-drawer-content
    [class.z-20!]="!isMobile()"
    class="h-full flex! flex-col! bg-gray-100/40 relative overflow-hidden!"
  >
    <!-- Main Dynamic Views Section -->
    <div class="flex-1 min-h-0 flex flex-col p-6 space-y-4 overflow-hidden">
      <app-booking-views
        class="flex-1 min-h-0 w-full flex flex-col overflow-hidden"
        [activeTab]="activeTab()"
        [viewMode]="viewMode()"
        [bookings]="filteredBookings()"
        [selectedVehicleTypeFilter]="selectedVehicleTypeFilter()"
        [isMobile]="isMobile()"
        (toggleVehicleType)="toggleVehicleType($event)"
        (bookingClick)="openDetail($event)"
        (dateSelect)="onDateSelected($event)"
      />
    </div>
  </mat-drawer-content>
</mat-drawer-container>
}

<!-- Detail Modal Dialog popup -->
<app-booking-detail-modal
  [title]="activeTab() === 'active' ? 'Booking Details' : 'Booking History Details'"
  [description]="activeTab() === 'active' ? 'Summary of vehicle bookings and usage in the system' : 'Detailed information of past and current vehicle bookings'"
  [bookingDate]="selectedBooking()?.bookingDate || ''"
  [startTime]="selectedBooking()?.startTime || ''"
  [endTime]="selectedBooking()?.endTime || ''"
  [destination]="selectedBooking()?.destination || ''"
  [purpose]="selectedBooking()?.purpose || ''"
  [userName]="selectedBooking()?.userName || ''"
  [userPhone]="selectedBooking()?.userPhone || ''"
  [vehicle]="selectedBooking()?.vehicle || null"
  [status]="selectedBooking()?.status || 'CONFIRMED'"
  [depart]="selectedBooking()?.depart || ''"
  [returnTime]="selectedBooking()?.return || ''"
  [bookedByUser]="selectedBooking()?.bookedByUser || null"
  [bookedForUser]="selectedBooking()?.bookedForUser || null"
  [isModal]="true"
  [isOpen]="isModalOpen()"
  (close)="closeDetail()"
  (cancel)="onCancelBooking(selectedBooking()?.id || '')"
  (complete)="onCompleteBooking(selectedBooking()?.id || '', $event)"
/>
