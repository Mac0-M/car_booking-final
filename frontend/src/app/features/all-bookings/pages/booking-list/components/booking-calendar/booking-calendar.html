<div class="calendar-view bg-white p-4 rounded-2xl border border-gray-100 shadow-sm relative overflow-hidden" style="min-height: 650px;">
  <!-- Legend -->
  <div class="flex flex-wrap items-center gap-4 mb-4 text-xs font-bold text-gray-500 border-b border-gray-100 pb-3">
    <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-blue-500"></span> Sedan</span>
    <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-emerald-500"></span> Pickup</span>
    <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-violet-500"></span> Van</span>
    <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-orange-500"></span> SUV</span>
    <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-full bg-pink-500"></span> Other</span>
  </div>

  <!-- Calendar Controls -->
  <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3 mb-4 bg-gray-50 p-2 rounded-xl border border-gray-100">
    <!-- Navigation Buttons -->
    <div class="flex items-center gap-1.5 justify-center sm:justify-start">
      <button (click)="prev()"
              class="p-2 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black cursor-pointer active:scale-95 transition-all flex items-center justify-center select-none">
        <span class="material-icons text-base">chevron_left</span>
      </button>
      <button (click)="today()"
              class="px-4 py-1.5 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black font-bold text-xs cursor-pointer active:scale-95 transition-all select-none">
        Today
      </button>
      <button (click)="next()"
              class="p-2 rounded-lg border border-gray-200 bg-white text-gray-700 hover:bg-gray-100 hover:text-black cursor-pointer active:scale-95 transition-all flex items-center justify-center select-none">
        <span class="material-icons text-base">chevron_right</span>
      </button>
    </div>

    <!-- View Mode Switcher -->
    <div class="flex items-center bg-gray-200 p-0.5 rounded-lg shrink-0 justify-center">
      <button (click)="changeView('month')"
              [class.bg-white]="calendarView === 'month'"
              [class.shadow-sm]="calendarView === 'month'"
              [class.text-gray-800]="calendarView === 'month'"
              [class.text-gray-500]="calendarView !== 'month'"
              class="px-3.5 py-1.5 rounded-md text-xs font-bold transition-all cursor-pointer select-none border-0">
        Month
      </button>
      <button (click)="changeView('week')"
              [class.bg-white]="calendarView === 'week'"
              [class.shadow-sm]="calendarView === 'week'"
              [class.text-gray-800]="calendarView === 'week'"
              [class.text-gray-500]="calendarView !== 'week'"
              class="px-3.5 py-1.5 rounded-md text-xs font-bold transition-all cursor-pointer select-none border-0">
        Week
      </button>
      <button (click)="changeView('day')"
              [class.bg-white]="calendarView === 'day'"
              [class.shadow-sm]="calendarView === 'day'"
              [class.text-gray-800]="calendarView === 'day'"
              [class.text-gray-500]="calendarView !== 'day'"
              class="px-3.5 py-1.5 rounded-md text-xs font-bold transition-all cursor-pointer select-none border-0">
        Day
      </button>
    </div>
  </div>

  <!-- TUI Container -->
  <div id="calendar-container" style="height: 520px;"></div>
</div>
