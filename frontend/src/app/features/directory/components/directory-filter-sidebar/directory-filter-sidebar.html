<component-filter-sidebar
  [showHeader]="showHeader"
  [titleKey]="titleKey"
  (close)="close.emit()"
  (reset)="reset.emit()"
>
  <div class="space-y-4 select-none">
    <!-- Quick Filters (Car Types) -->
    <div class="space-y-1 border-b border-sand-100 pb-3 mb-1 shrink-0">
      <div
        class="flex items-center gap-1 sm:gap-1.5 flex-nowrap overflow-x-auto no-scrollbar p-1 shrink-0"
      >
        @for (type of vehicleTypes; track type.value) {
        <button
          (click)="toggleVehicleType(type.value)"
          [class.ring-2]="selectedTypes.includes(type.value)"
          [class.ring-offset-2]="selectedTypes.includes(type.value)"
          [ngClass]="selectedTypes.includes(type.value) ? type.ringClass : ''"
          class="flex items-center gap-1 px-1.5 py-0.5 rounded-full border border-sand-200 bg-white text-xs font-semibold text-sand-700 cursor-pointer select-none transition-all active:scale-95 duration-100"
        >
          <span
            class="w-1.5 h-1.5 rounded-full"
            [ngClass]="type.dotColor"
          ></span>
          <translate-fixed [key]="type.label" />
        </button>
        }
      </div>
    </div>

    <!-- Search Bar -->
    <div class="space-y-1">
      <label
        class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
      >
        <translate-fixed key="Search / ค้นหา" />
      </label>
      <div class="relative w-full">
        <span
          class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-sand-400 text-lg"
          >search</span
        >
        <input
          type="text"
          [value]="searchQuery"
          (input)="searchQueryChange.emit($any($event.target).value)"
          [placeholder]="'Search...' | translate"
          class="w-full pl-10 pr-4 py-2.5 border border-sand-200 rounded-xl text-sm focus:outline-none focus:border-sand-400 transition-colors bg-sand-50/50 font-sans"
        />
      </div>
    </div>

    <!-- Status Filter -->
    <div class="space-y-1">
      <label
        class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
      >
        <translate-fixed key="Status / สถานะ" />
      </label>
      <select
        [value]="selectedStatus"
        (change)="selectedStatusChange.emit($any($event.target).value)"
        class="w-full px-2.5 py-1.5 border border-sand-200 rounded-lg text-xs bg-sand-50/50 focus:outline-none focus:border-sand-400 font-sans"
      >
        <option value="">{{ 'All Status / สถานะทั้งหมด' | translate }}</option>
        <option value="available">
          {{ 'Available / พร้อมใช้งาน' | translate }}
        </option>
        <option value="unavailable">
          {{ 'Unavailable / ไม่พร้อมใช้งาน' | translate }}
        </option>
      </select>
    </div>

    <!-- Refuel Filter -->
    <div class="space-y-1">
      <label
        class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
      >
        <translate-fixed key="Fuel Status / สถานะน้ำมัน" />
      </label>
      <select
        [value]="selectedReFuel"
        (change)="selectedReFuelChange.emit($any($event.target).value)"
        class="w-full px-2.5 py-1.5 border border-sand-200 rounded-lg text-xs bg-sand-50/50 focus:outline-none focus:border-sand-400 font-sans"
      >
        <option value="">
          {{ 'All Fuel Statuses / สถานะน้ำมันทั้งหมด' | translate }}
        </option>
        <option value="true">
          {{ 'Refueled / เติมน้ำมันแล้ว' | translate }}
        </option>
        <option value="false">
          {{ 'Needs Refuel / ต้องเติมน้ำมัน' | translate }}
        </option>
      </select>
    </div>
  </div>
</component-filter-sidebar>
