<!-- Mobile Filter Trigger Button -->
@if (showTrigger) {
<component-button
  (click)="openMobileFilters()"
  [variant]="activeFiltersCount > 0 ? 'submit' : 'secondary'"
  size="xs"
  class="w-auto font-sans"
>
  <span class="material-icons text-base mr-1">filter_list</span>
  <span><translate-fixed key="Filter"/></span>
  @if (activeFiltersCount > 0) {
  <span
    class="flex items-center justify-center bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full ml-1.5 shrink-0"
  >
    {{ activeFiltersCount }}
  </span>
  }
</component-button>
}

<!-- Mobile Filters CDK Dialog Template -->
<ng-template #dialogTemplate>
  <div
    class="relative w-full bg-white flex flex-col h-auto max-h-[80dvh] rounded-t-3xl overflow-hidden"
  >
    <!-- Drag Indicator / Accent bar at top of bottom-sheet -->
    <div class="flex justify-center py-2 shrink-0">
      <div class="w-10 h-1 bg-sand-300 rounded-full"></div>
    </div>

    <!-- Header -->
    <div
      class="px-4 pb-2 border-b border-sand-100 flex items-center justify-between shrink-0"
    >
      <h3
        class="text-sm font-bold text-sand-900 flex items-center gap-1.5"
      >
        <span class="material-icons text-base text-sand-500">search</span>
        <span><translate-fixed key="Search & Filters / ค้นหาและกรอง"/></span>
      </h3>
      <component-button
        (click)="closeMobileFilters()"
        variant="plain"
        size="xs"
        class="w-auto"
      >
        <span class="material-icons text-base">close</span>
      </component-button>
    </div>

    <!-- Content (Scrollable) -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3.5">
      <!-- Quick Filters (Car Types) -->
      <div class="space-y-1.5">
        <label
          class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
          ><translate-fixed key="Vehicle Type / ประเภทรถ"/></label
        >
        <div class="flex flex-wrap items-center gap-2">
          @for (type of vehicleTypes; track type.value) {
          <button
            component-filter-pill
            [label]="type.label | translate"
            [active]="localSelectedTypes.includes(type.value)"
            [dotColor]="type.dotColor"
            [ringClass]="type.ringClass"
            size="md"
            (click)="toggleLocalVehicleType(type.value)"
          ></button>
          }
        </div>
      </div>

      <!-- Search Bar -->
      <div class="space-y-1">
        <label
          class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
          ><translate-fixed key="Search"/></label
        >
        <div class="relative">
          <span
            class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-sand-400 text-base"
            >search</span
          >
          <input
            type="text"
            [value]="localSearchQuery"
            (input)="localSearchQuery = $any($event.target).value"
            [placeholder]="'Search...' | translate"
            class="w-full pl-9 pr-3 py-2.5 border border-sand-200 rounded-xl text-xs focus:outline-none focus:border-sand-400 transition-colors bg-sand-50/50 font-sans"
          />
        </div>
      </div>

      <!-- Status Filter -->
      <div class="space-y-1">
        <label
          class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
          ><translate-fixed key="Status"/></label
        >
        <select
          [ngModel]="localSelectedStatus"
          (ngModelChange)="localSelectedStatus = $event"
          class="w-full px-3 py-2.5 border border-sand-200 rounded-xl text-xs bg-sand-50/50 focus:outline-none focus:border-sand-400 font-sans"
        >
          <option value="">
            {{ 'All Status / สถานะทั้งหมด' | translate }}
          </option>
          <option value="available">
            {{ 'Available / พร้อมใช้งาน' | translate }}
          </option>
          <option value="unavailable">
            {{ 'Unavailable / ไม่พร้อมใช้งาน' | translate }}
          </option>
        </select>
      </div>

      <!-- Refuel Filter -->
      <div class="space-y-1">
        <label
          class="text-[10px] font-bold text-sand-400 block uppercase tracking-wider"
          ><translate-fixed key="Fuel Status"/></label
        >
        <select
          [ngModel]="localSelectedReFuel"
          (ngModelChange)="localSelectedReFuel = $event"
          class="w-full px-3 py-2.5 border border-sand-200 rounded-xl text-xs bg-sand-50/50 focus:outline-none focus:border-sand-400 font-sans"
        >
          <option value="">
            {{ 'All Fuel Statuses / สถานะน้ำมันทั้งหมด' | translate }}
          </option>
          <option value="true">
            {{ 'Refueled / เติมน้ำมันแล้ว' | translate }}
          </option>
          <option value="false">
            {{ 'Needs Refuel / ต้องเติมน้ำมัน' | translate }}
          </option>
        </select>
      </div>
    </div>

    <!-- Footer / Actions -->
    <div
      class="px-4 py-3 border-t border-sand-100 bg-sand-50/50 flex items-center justify-between gap-2.5 shrink-0"
    >
      <component-button
        (click)="clearAllFilters()"
        variant="cancel"
        size="sm"
        class="flex-1"
      >
        <translate-fixed key="Clear Filters" align="center"/>
      </component-button>
      <component-button
        (click)="applyFilters()"
        variant="submit"
        size="sm"
        class="flex-1"
      >
        <translate-fixed key="Apply" align="center"/>
      </component-button>
    </div>
  </div>
</ng-template>
