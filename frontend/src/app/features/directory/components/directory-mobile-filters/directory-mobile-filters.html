<!-- Mobile Filter Trigger Button -->
<button
  (click)="openMobileFilters()"
  [class.bg-gray-700]="activeFiltersCount > 0"
  [class.text-white]="activeFiltersCount > 0"
  [class.bg-white]="activeFiltersCount === 0"
  [class.text-gray-700]="activeFiltersCount === 0"
  [class.border-gray-700]="activeFiltersCount > 0"
  [class.border-gray-200]="activeFiltersCount === 0"
  class="flex items-center justify-center gap-1.5 px-3.5 py-1.5 rounded-xl border text-xs font-bold transition-all cursor-pointer select-none active:scale-95 shadow-sm min-h-[32px] font-sans"
>
  <span class="material-icons text-base">filter_list</span>
  <span>Filter</span>
  @if (activeFiltersCount > 0) {
    <span class="flex items-center justify-center bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full">
      {{ activeFiltersCount }}
    </span>
  }
</button>

<!-- Mobile Filters Drawer popup sheet -->
@if (showMobileFiltersPopup()) {
  <div class="fixed inset-0 z-50 flex items-end justify-center select-none animate-in fade-in duration-200">
    <!-- Backdrop -->
    <div
      (click)="closeMobileFilters()"
      class="absolute inset-0 bg-gray-700/60 backdrop-blur-sm transition-opacity duration-300"
    ></div>

    <!-- Modal Bottom Sheet Panel -->
    <div
      class="relative w-full bg-white rounded-t-3xl shadow-2xl z-10 flex flex-col max-h-[85vh] animate-in slide-in-from-bottom duration-300 border-t border-gray-100"
    >
      <!-- Top Drag Indicator Bar -->
      <div class="flex justify-center py-2.5 shrink-0">
        <div class="w-12 h-1 bg-gray-300 rounded-full"></div>
      </div>

      <!-- Sheet Header -->
      <div class="px-5 pb-3 border-b border-gray-100 flex items-center justify-between shrink-0">
        <h3 class="text-sm font-bold text-gray-900 flex items-center gap-1.5 font-sans">
          <span class="material-icons text-base text-gray-500">search</span>
          <span>Search & Filters / ค้นหาและกรอง</span>
        </h3>
        <button
          (click)="closeMobileFilters()"
          class="p-1 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors border-0 bg-transparent cursor-pointer flex items-center"
        >
          <span class="material-icons text-base">close</span>
        </button>
      </div>

      <!-- Scrollable content fields -->
      <div class="flex-1 overflow-y-auto p-5 space-y-4">
        <!-- Quick Filters (Car Types) -->
        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-gray-400 block uppercase tracking-wider">Vehicle Type / ประเภทรถ</label>
          <div class="flex flex-wrap items-center gap-2">
            @for (type of vehicleTypes; track type.value) {
              <button
                (click)="toggleVehicleType(type.value)"
                [class.ring-2]="selectedType === type.value"
                [class.ring-offset-2]="selectedType === type.value"
                [ngClass]="selectedType === type.value ? type.ringClass : ''"
                class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-full border border-gray-200 bg-white text-xs font-semibold text-gray-700 cursor-pointer select-none transition-all active:scale-95 duration-100"
              >
                <span class="w-1.5 h-1.5 rounded-full" [ngClass]="type.dotColor"></span>
                {{ type.label }}
              </button>
            }
          </div>
        </div>

        <!-- Search Bar -->
        <div class="space-y-1">
          <label class="text-[10px] font-bold text-gray-400 block uppercase tracking-wider">Search</label>
          <div class="relative">
            <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-base">search</span>
            <input type="text"
                   [value]="searchQuery"
                   (input)="searchQueryChange.emit($any($event.target).value)"
                   placeholder="Search..."
                   class="w-full pl-9 pr-3 py-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none focus:border-gray-400 transition-colors bg-gray-50/50 font-sans" />
          </div>
        </div>

        <!-- Status Filter -->
        <div class="space-y-1">
          <label class="text-[10px] font-bold text-gray-400 block uppercase tracking-wider">Status</label>
          <select [value]="selectedStatus"
                  (change)="selectedStatusChange.emit($any($event.target).value)"
                  class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400 font-sans">
            <option value="">All Status / สถานะทั้งหมด</option>
            <option value="available">Available / พร้อมใช้งาน</option>
            <option value="unavailable">Unavailable / ไม่พร้อมใช้งาน</option>
          </select>
        </div>

        <!-- Refuel Filter -->
        <div class="space-y-1">
          <label class="text-[10px] font-bold text-gray-400 block uppercase tracking-wider">Fuel Status</label>
          <select [value]="selectedReFuel"
                  (change)="selectedReFuelChange.emit($any($event.target).value)"
                  class="w-full px-3 py-2.5 border border-gray-200 rounded-xl text-xs bg-gray-50/50 focus:outline-none focus:border-gray-400 font-sans">
            <option value="">All Fuel Statuses / สถานะน้ำมันทั้งหมด</option>
            <option value="true">Refueled / เติมน้ำมันแล้ว</option>
            <option value="false">Needs Refuel / ต้องเติมน้ำมัน</option>
          </select>
        </div>
      </div>

      <!-- Footer Actions buttons -->
      <div class="px-5 py-4 border-t border-gray-100 bg-gray-50/50 flex items-center justify-between gap-3 shrink-0">
        <button
          (click)="resetFilters.emit(); closeMobileFilters()"
          class="px-4 py-2.5 rounded-xl border border-gray-200 text-gray-600 bg-white hover:bg-gray-50 text-xs font-semibold cursor-pointer active:scale-95 transition-all flex-1 text-center font-sans"
        >
          Clear Filters
        </button>
        <button
          (click)="closeMobileFilters()"
          class="px-5 py-2.5 bg-gray-700 text-white text-xs font-semibold hover:bg-gray-800 cursor-pointer active:scale-95 transition-all flex-1 text-center font-sans"
        >
          Apply
        </button>
      </div>
    </div>
  </div>
}
