<mat-drawer-container
  [hasBackdrop]="true"
  class="booking-drawer-container h-[calc(100dvh-4rem)] w-full bg-container-low overflow-hidden!"
>
  <!-- Right Filter Drawer (Desktop overlay) -->
  <mat-drawer
    #filterDrawer
    position="end"
    mode="over"
    [opened]="filterDrawerOpened() && !isMobile()"
    (closedStart)="filterDrawerOpened.set(false)"
    class="w-80 border-l border-sand-200 bg-white shadow-sm flex flex-col h-full z-30 animate-in slide-in-from-right duration-200"
  >
    <app-directory-filter-sidebar
      [showHeader]="true"
      titleKey="Search & Filters / ค้นหาและกรอง"
      [searchQuery]="searchQuery()"
      [selectedTypes]="selectedTypes()"
      [selectedStatus]="selectedStatus()"
      [selectedReFuel]="selectedReFuel()"
      (searchQueryChange)="searchQuery.set($event)"
      (selectedTypesChange)="selectedTypes.set($event)"
      (selectedStatusChange)="selectedStatus.set($event)"
      (selectedReFuelChange)="selectedReFuel.set($event)"
      (close)="filterDrawerOpened.set(false)"
      (reset)="resetFilters()"
    ></app-directory-filter-sidebar>
  </mat-drawer>

  <!-- Center Content Area -->
  <mat-drawer-content
    class="h-full flex! flex-col! bg-container-low relative overflow-hidden!"
  >
    <!-- Top Header Bar -->
    <div
      class="w-full bg-white border-b border-sand-200 shrink-0 px-3 md:px-6 py-3"
    >
      <div class="flex items-center justify-between gap-2 md:gap-4 h-9">
        <!-- Left Side: Tabs Switcher + View Switcher -->
        <div class="flex items-center gap-1.5 md:gap-2 min-w-0">
          <!-- Tab Switcher -->
          <component-tab-switcher
            [activeTab]="activeTab()"
            tab1Value="vehicles"
            tab1Label="Vehicles"
            tab1Icon="directions_car"
            tab2Value="users"
            tab2Label="Users"
            tab2Icon="people_outline"
            (activeTabChange)="setActiveTab($event)"
          ></component-tab-switcher>

          <!-- Vertical Divider -->
          <div
            class="h-6 w-[1px] bg-sand-300 mx-1 md:mx-2 self-center shrink-0"
          ></div>

          <!-- View Mode Switcher Component -->
          <component-view-switcher
            [viewMode]="viewMode()"
            [isMobile]="isMobile()"
            [modes]="['grid', 'list']"
            (viewModeChange)="viewMode.set($any($event))"
          ></component-view-switcher>
        </div>

        <!-- Right Side: Filter + Add Button -->
        <div class="flex items-center gap-2 md:gap-4 shrink-0">
          <!-- Filter Controls (Desktop, only for vehicles) -->
          @if (!isMobile() && activeTab() === 'vehicles') {
            <!-- Clear Filters Button -->
            @if (activeFiltersCount() > 0) {
            <button
              (click)="resetFilters()"
              class="flex items-center justify-center w-9 h-9 rounded-full border border-red-200 bg-white text-red-600 hover:bg-red-50 active:scale-95 transition-all cursor-pointer shrink-0"
              [title]="'Clear Filters' | translate"
            >
              <span class="material-icons text-base">close</span>
            </button>
            }

            <!-- Filter Drawer Toggle Button -->
            <button
              (click)="filterDrawerOpened.set(!filterDrawerOpened())"
              [class.bg-primary]="filterDrawerOpened() || activeFiltersCount() > 0"
              [class.text-white]="filterDrawerOpened() || activeFiltersCount() > 0"
              [class.border-primary]="filterDrawerOpened() || activeFiltersCount() > 0"
              [class.bg-primary-container]="!filterDrawerOpened() && activeFiltersCount() === 0"
              [class.text-primary]="!filterDrawerOpened() && activeFiltersCount() === 0"
              [class.border-primary-fixed-dim/30]="!filterDrawerOpened() && activeFiltersCount() === 0"
              class="flex items-center gap-1.5 px-4 py-1.5 rounded-xl text-xs font-bold transition-all cursor-pointer select-none border active:scale-95 shrink-0 min-w-[90px] h-9"
            >
              <span class="material-icons text-sm">filter_list</span>
              <translate-fixed key="Filters" align="center" />
              @if (activeFiltersCount() > 0) {
              <span
                class="flex items-center justify-center bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full ml-1 shrink-0"
              >
                {{ activeFiltersCount() }}
              </span>
              }
            </button>
          }

          <!-- Add / Register Button -->
          @if (isAdmin()) { @if (activeTab() === 'vehicles') {
          <button
            (click)="openAddVehicleModal()"
            class="btn-purple-theme flex items-center justify-center gap-1.5 px-3 rounded-xl text-xs font-bold transition-all cursor-pointer select-none border border-primary bg-primary text-white shadow-sm active:scale-95 shrink-0 lg:w-[120px] w-[140px] h-9"
            [title]="'Add Vehicle' | translate"
          >
            <span class="material-icons text-sm sm:text-base">add</span>
            <translate-fixed key="Add Vehicle" align="center" />
          </button>
          } @else if (activeTab() === 'users') {
          <button
            (click)="openAddUserModal()"
            class="btn-purple-theme flex items-center justify-center gap-1.5 px-3 rounded-xl text-xs font-bold transition-all cursor-pointer select-none border border-primary bg-primary text-white shadow-sm active:scale-95 shrink-0 lg:w-[120px] w-[140px] h-9"
            [title]="(isSuperAdmin() ? 'Add Admin' : 'Add User') | translate"
          >
            <span class="material-icons text-sm sm:text-base">person_add</span>
            <translate-fixed
              [key]="isSuperAdmin() ? 'Add Admin' : 'Add User'"
              align="center"
            />
          </button>
          } }
        </div>
      </div>
    </div>

    <!-- Main Dynamic Views Section -->
    <div class="flex-1 min-h-0 w-full overflow-y-auto">
      @if (activeTab() === 'vehicles') {
      <app-vehicle-list
        #vehicleList
        [hideHeader]="true"
        [hideFilters]="true"
        [searchQueryInput]="searchQuery()"
        [selectedTypesInput]="selectedTypes()"
        [selectedStatusInput]="selectedStatus()"
        [selectedReFuelInput]="selectedReFuel()"
        [viewMode]="viewMode()"
        [isMobile]="isMobile()"
      ></app-vehicle-list>
      } @if (activeTab() === 'users') {
      <app-user-list
        #userList
        [hideHeader]="true"
        [viewMode]="viewMode()"
        [isMobile]="isMobile()"
      ></app-user-list>
      }
    </div>
  </mat-drawer-content>
</mat-drawer-container>

<!-- Mobile Filters Modal Popup -->
<app-directory-mobile-filters
  [searchQuery]="searchQuery()"
  [selectedTypes]="selectedTypes()"
  [selectedStatus]="selectedStatus()"
  [selectedReFuel]="selectedReFuel()"
  [activeFiltersCount]="activeFiltersCount()"
  [showTrigger]="false"
  (searchQueryChange)="searchQuery.set($event)"
  (selectedTypesChange)="selectedTypes.set($event)"
  (selectedStatusChange)="selectedStatus.set($event)"
  (selectedReFuelChange)="selectedReFuel.set($event)"
  (resetFilters)="resetFilters()"
></app-directory-mobile-filters>
