<div class="max-w-md mx-auto my-10 p-4">
  <component-card variant="default" size="lg">
    <div class="flex flex-col items-center gap-2 mb-6">
      <div
        class="flex items-center justify-center w-12 h-12 rounded-2xl bg-primary text-white shadow-md"
      >
        <span class="material-icons text-2xl">directions_car</span>
      </div>
      <h2 class="text-2xl font-black tracking-tight text-primary">
        CarBooking
      </h2>
    </div>

    <!-- Email + Password Form -->
    <form (ngSubmit)="onSubmitLocal()" class="space-y-4">
      <component-input-ui
        label="Email"
        placeholder="example@domain.com"
        type="email"
        name="email"
        [(ngModel)]="email"
        (ngModelChange)="emailError = ''"
        [error]="emailError"
        required
      ></component-input-ui>

      <component-input-ui
        label="Password"
        placeholder="Enter your password"
        type="password"
        name="password"
        [(ngModel)]="password"
        (ngModelChange)="passwordError = ''"
        [error]="passwordError"
        required
      ></component-input-ui>

      <div class="pt-2">
        <component-button
          type="submit"
          variant="submit"
          size="sm"
          class="w-full"
        >
          Login
        </component-button>
      </div>
    </form>
  </component-card>
</div>
